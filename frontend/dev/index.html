<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DAX [DEV] — Dakona</title>
    <link rel="icon" href="/assets/logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
    <script
      crossorigin="anonymous"
      src="https://unpkg.com/@azure/msal-browser@5.9.0/lib/msal-browser.min.js"
    ></script>
  </head>
  <body class="login-body">
    <header class="login-topbar">
      <img src="/assets/dakona-wordmark.png" alt="DAKONA" class="dakona-wordmark" />
      <span class="env-badge">DEV — dev.dax.dakona.com</span>
    </header>
    <main class="login-main">
      <div class="login-card">
        <img src="/assets/dax-avatar.png" alt="DAX" class="dax-avatar" />
        <div class="brand-name">DAX</div>
        <div class="brand-strip">
          <span class="brand-strip-segment">Powered by Azure</span>
          <span class="brand-strip-divider">|</span>
          <span class="brand-strip-segment">Managed by <strong>DAKONA</strong></span>
        </div>
        <h1 class="welcome">Welcome back</h1>
        <button id="signin-btn" class="ms-signin" type="button" aria-label="Sign in with Microsoft">
          <img src="/assets/microsoft-signin.png" alt="Sign in with Microsoft" />
        </button>
        <p class="login-foot" id="login-foot">Sign in with your Dakona account to continue.</p>
      </div>
    </main>
    <script src="/login.js" defer></script>
  </body>
</html>
