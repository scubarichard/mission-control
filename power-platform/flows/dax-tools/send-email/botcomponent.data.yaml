kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: to
  - kind: AutomaticTaskInput
    propertyName: subject
  - kind: AutomaticTaskInput
    propertyName: body
modelDescription: Use this tool to send an email from the advisor's Outlook mailbox. Call this ONLY when the user explicitly asks to send an email or 'email' someone. Confirm recipient/subject/body before sending.
outputs:
  - propertyName: sent
  - propertyName: to
  - propertyName: subject
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false