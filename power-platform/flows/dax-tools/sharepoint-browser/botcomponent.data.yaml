kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: siteHost
  - kind: AutomaticTaskInput
    propertyName: sitePath
  - kind: AutomaticTaskInput
    propertyName: folder
modelDescription: |
  Browse files in a SharePoint document library. Use when an advisor asks to
  see SharePoint files, browse documents, or find files in DAX Documents folder.
  Defaults to dakona.sharepoint.com/sites/DAX root if siteHost/sitePath not given.
outputs:
  - propertyName: items
  - propertyName: siteId
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false
