kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: siteHost
  - kind: AutomaticTaskInput
    propertyName: sitePath
  - kind: AutomaticTaskInput
    propertyName: folder
modelDescription: Use this tool to list files in a SharePoint folder. Call this whenever the user asks to 'see SharePoint files', 'browse documents', 'show me what's in DAX Documents', 'list files'. Default folder is 'DAX Documents'. Other folders: DAX Reports, DAX Templates, DAX Uploads, Schwab Exports.
outputs:
  - propertyName: items
  - propertyName: siteId
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false