kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: ticker
modelDescription: Use this tool to get a live quote for a specific stock or ETF ticker symbol — price, day range, year range, volume, market cap, P/E. Call this whenever the user asks about a specific ticker's price, asks 'what is X trading at', 'price of X', 'how is X doing', or any current quote question. Pass the ticker symbol.
outputs:
  - propertyName: ticker
  - propertyName: fmp
  - propertyName: finnhub
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false