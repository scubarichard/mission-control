kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: tag
  - kind: AutomaticTaskInput
    propertyName: perPage
modelDescription: Use this tool to list clients from Wealthbox CRM, optionally filtered by tag (e.g. ESG, Hot, A-tier, Retired). Call this whenever the user asks 'show me my clients', 'list clients', 'who are my X clients', 'find clients with tag Y'.
outputs:
  - propertyName: tag
  - propertyName: contacts
  - propertyName: totalResults
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false