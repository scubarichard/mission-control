kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: count
  - kind: AutomaticTaskInput
    propertyName: search
modelDescription: Use this tool to read recent emails from the advisor's Outlook inbox. Call this whenever the user asks to 'read my email', 'check inbox', 'find an email', 'last X emails', 'unread emails', or asks about specific senders/subjects. Pass count (default 5) and optional search query.
outputs:
  - propertyName: messages
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false