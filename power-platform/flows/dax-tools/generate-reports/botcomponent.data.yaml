kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: period
  - kind: AutomaticTaskInput
    propertyName: clientId
modelDescription: Use this tool to trigger generation of quarterly client reports via the n8n schwab-processor pipeline. Call this whenever the user asks to 'generate reports', 'produce quarterly reviews', 'review Schwab data', 'create Q1/Q2/Q3/Q4 reviews'. Pass the period (e.g. Q1-2026) and optional clientId.
outputs:
  - propertyName: period
  - propertyName: result
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false