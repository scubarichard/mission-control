kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: query
modelDescription: Use this tool to get current market news and live quotes for the major indices (S&P 500, Dow, Nasdaq, Russell 2000, Treasuries, Gold, US Dollar). Call this whenever the user asks 'what is driving markets', 'any market news', 'how are markets doing', 'market update', or general questions about today's market conditions. Optional query parameter.
outputs:
  - propertyName: query
  - propertyName: news
  - propertyName: indices
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false