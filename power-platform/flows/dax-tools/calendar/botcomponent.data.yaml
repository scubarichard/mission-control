kind: TaskDialog
mode: Strict
inputs:
  - kind: AutomaticTaskInput
    propertyName: start
  - kind: AutomaticTaskInput
    propertyName: end
modelDescription: Use this tool to read calendar events from the advisor's Outlook calendar. Call this whenever the user asks 'what's on my calendar', 'today's schedule', 'meetings this week', 'do I have anything tomorrow', or asks about upcoming events. Pass ISO start/end if specific dates.
outputs:
  - propertyName: events
  - propertyName: start
  - propertyName: end
  - propertyName: asOf
action:
  kind: InvokeFlowTaskAction
  flowId: __FLOW_ID__
outputMode: All
triggerCondition: false