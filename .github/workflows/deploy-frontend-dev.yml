name: Deploy DAX dev frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/dev/**'
      - '.github/workflows/deploy-frontend-dev.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy to Azure Static Web Apps (stapp-dax-dev)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dev
          api_location: frontend/dev/api
          output_location: ''
          skip_app_build: true
