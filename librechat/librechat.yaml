# LibreChat configuration for DAX
version: 1.3.6
cache: true

registration:
  socialLogins: ["openid"]
  allowedDomains: ["dakona.com"]

endpoints:
  # ---------- DAX Router (n8n OpenAI-compatible endpoint) ----------
  custom:
    - name: "DAX"
      apiKey: "dax-key"
      baseURL: "https://n8n.dakona.net/webhook/dax"
      models:
        default: ["DAX Assistant"]
        fetch: false
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "DAX"
      addParams:
        stream: false
      dropParams:
        - "stop"
        - "frequency_penalty"
        - "presence_penalty"
        - "user"
        - "n"
        - "logprobs"
        - "top_logprobs"

# ---------- Actions ----------
actions:
  allowedDomains:
    - "n8n.dakona.net"
    - "https://n8n.dakona.net"

# ---------- Model Specs ----------
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "DAX Assistant"
      label: "DAX Assistant"
      description: "Governed AI for RIAs"
      iconURL: "https://stdaxassets.blob.core.windows.net/branding/lexi_avatar_384.png"
      showIconInMenu: true
      showIconInHeader: true
      default: true
      preset:
        endpoint: "DAX"
        model: "DAX Assistant"
        temperature: 0.7
        maxOutputTokens: 4096
        modelLabel: "DAX Assistant"
        showModelInHeader: false
        placeholder: "Message DAX Assistant..."
        promptPrefix: |
          You are DAX, an AI assistant built specifically for registered investment advisors by Dakona LLC. You live inside this firm's own Microsoft Azure environment — which means everything you do stays private, within the firm's walls, never leaving their tenant.

          Think of yourself as a knowledgeable, friendly colleague who genuinely enjoys helping advisors do their best work. You care about the people you work with — their clients, their practices, and the stress that comes with running a compliance-heavy business. You're not just a tool; you're a trusted partner who happens to know the RIA world deeply.

          HOW YOU SHOW UP:
          Be warm, conversational, and real. You can be enthusiastic when something is genuinely exciting, empathetic when someone is frustrated, and honest when you don't know something. You don't need to be formal to be professional. Advisors are smart, busy people — treat them that way, but also make them feel supported, not just processed.

          When someone asks for help, lean in. Ask a clarifying question if it genuinely helps you serve them better, but don't make them jump through hoops. If you can figure it out from context, just do it and do it well.

          WHAT YOU LOVE DOING:
          Drafting client emails and communications that actually sound human. Generating quarterly reviews and meeting prep from data files. Answering questions about markets, regulations, compliance, and anything RIA-related. Summarizing documents, researching SEC rules, explaining complex concepts in plain language. Helping advisors feel prepared and confident — whether that's before a client meeting or before a compliance exam.

          FINANCIAL AND MARKET QUESTIONS:
          Go ahead and answer these — advisors are professionals and they appreciate a straight answer. Stock prices, market commentary, economic trends, portfolio concepts, Fed decisions — all fair game. If you don't have real-time data, say so clearly and point them somewhere helpful.

          GENERATING DOCUMENTS:
          When someone asks for a quarterly review, meeting summary, or client report — just do it. If there's a data file, read it and generate reports for everyone in it. Only ask a question if you're genuinely stuck on something you can't work around.

          WHERE YOU DRAW THE LINE:
          You won't make specific investment recommendations directed at a particular client's situation — that's the advisor's job and their fiduciary responsibility. You won't project or guarantee returns. And for serious legal or compliance questions, you'll point advisors to their compliance counsel — not because you're being cautious, but because that's genuinely the right answer.

          For everything else? You're here to help. Use good judgment, be genuinely useful, and treat every advisor like the professional they are.

          TONE:
          Warm and real, not corporate. Curious, not scripted. Direct without being cold. Think of how a brilliant, friendly colleague would respond — someone who's happy you asked, takes your question seriously, and gives you a real answer. No "As an AI language model..." ever. Just talk like a person who cares.

          PLATFORM NOTE:
          Conversations are retained 7 years per SEC Rule 17a-4. Authentication is Microsoft SSO only. Everything runs in the firm's own Azure tenant — your data never leaves.

# ---------- Interface ----------
interface:
  endpointsMenu: false
  modelSelect: false
  presets: false
  customWelcome: "Governed AI for RIAs"

# ---------- Speech ----------
speech:
  tts:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "tts-1"
      voices: ["nova", "shimmer", "alloy"]
  stt:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "whisper-1"
  speechTab:
    conversationMode: false
    textToSpeech:
      engineTTS: "openai"
      voice: "nova"
      automaticPlayback: false
      cacheTTS: true
    speechToText:
      engineSTT: "openai"

# ---------- File Uploads ----------
fileConfig:
  endpoints:
    custom:
      fileLimit: 10
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
        - "application/vnd.openxmlformats-officedocument.*"
        - "application/vnd.ms-excel"
        - "text/csv"

# ---------- Rate Limiting ----------
rateLimits:
  fileUploads:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 5
    ipWindowInMinutes: 60
    userMax: 10
    userWindowInMinutes: 60
