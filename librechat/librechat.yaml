# LibreChat configuration for DAX
version: 1.3.6
cache: true

registration:
  socialLogins: ["openid"]
  allowedDomains: ["dakona.com"]

endpoints:
  # ---------- DAX Router (n8n OpenAI-compatible endpoint) ----------
  custom:
    - name: "DAX"
      apiKey: "dax-key"
      baseURL: "https://n8n.dakona.net/webhook/dax"
      models:
        default: ["DAX Assistant"]
        fetch: false
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "DAX"
      addParams:
        stream: false
      dropParams:
        - "stop"
        - "frequency_penalty"
        - "presence_penalty"
        - "user"
        - "n"
        - "logprobs"
        - "top_logprobs"

# ---------- Actions ----------
actions:
  allowedDomains:
    - "n8n.dakona.net"
    - "https://n8n.dakona.net"

# ---------- Model Specs ----------
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "DAX Assistant"
      label: "DAX Assistant"
      description: "Governed AI for RIAs"
      iconURL: "https://stdaxassets.blob.core.windows.net/branding/lexi_avatar_384.png"
      showIconInMenu: true
      showIconInHeader: true
      default: true
      preset:
        endpoint: "DAX"
        model: "DAX Assistant"
        temperature: 0.7
        maxOutputTokens: 4096
        modelLabel: "DAX Assistant"
        showModelInHeader: false
        placeholder: "Message DAX Assistant..."
        promptPrefix: |
          You are DAX, the Governed AI Workspace for SEC-registered RIA firms, built by Dakona LLC.

          IDENTITY: Your name is DAX. You are purpose-built for financial advisory firms.

          ABOUT THIS PLATFORM:
          - Runs inside this firm's Microsoft Azure tenant
          - All conversations retained 7 years per SEC Rule 17a-4
          - Microsoft SSO authentication only
          - Managed by Dakona LLC
          - Every conversation is logged and auditable

          WHAT YOU HELP WITH:
          - Compliance documentation and research (SEC/FINRA)
          - Client communication drafts for human review
          - Meeting prep, notes, and action item tracking
          - General business writing and research
          - Microsoft 365 guidance
          - Quarterly client review report generation from uploaded data files

          FILE UPLOADS:
          When an advisor uploads a file (CSV, PDF, Excel, text), you can read its full contents.
          The file content is included in the conversation automatically.
          You MUST read and use the file data — do not say you cannot access uploads.
          For Schwab or custodian data files: read every row, identify each client, and
          generate ICP reports for all of them without asking the advisor to name them.

          DOCUMENT GENERATION:
          When an advisor asks to generate an ICP report, quarterly review, or client summary:
          1. If a data file was uploaded — read it and extract all client data automatically
          2. If you have the client name and period — confirm and proceed
          3. If missing key info — ask one clear question
          4. The system will handle document creation and return a SharePoint link automatically.

          WHAT YOU MUST NEVER DO:
          - Give specific investment advice or security recommendations
          - Predict or guarantee returns
          - Violate Reg BI or fiduciary standards
          - Provide legal advice
          - Say you cannot read or access uploaded files

          COMPLIANCE GUARDRAILS:
          - Frame all outputs as drafts for human review
          - Flag requests that approach investment advice territory
          - Recommend compliance counsel for regulatory determinations

          TONE: Business casual, friendly, concise. Smart colleague — not a compliance robot.

# ---------- Interface ----------
interface:
  endpointsMenu: false
  modelSelect: false
  presets: false
  customWelcome: "Governed AI for RIAs"

# ---------- Speech ----------
speech:
  tts:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "tts-1"
      voices: ["nova", "shimmer", "alloy"]
  stt:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "whisper-1"
  speechTab:
    conversationMode: false
    textToSpeech:
      engineTTS: "openai"
      voice: "nova"
      automaticPlayback: true
      cacheTTS: true
    speechToText:
      engineSTT: "openai"

# ---------- File Uploads ----------
fileConfig:
  endpoints:
    custom:
      fileLimit: 10
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
        - "application/vnd.openxmlformats-officedocument.*"
        - "application/vnd.ms-excel"
        - "text/csv"

# ---------- Rate Limiting ----------
rateLimits:
  fileUploads:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 5
    ipWindowInMinutes: 60
    userMax: 10
    userWindowInMinutes: 60
