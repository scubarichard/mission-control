# LibreChat configuration for DAX
# Docs: https://www.librechat.ai/docs/configuration/librechat_yaml
version: 1.3.6

cache: true

# ---------- Registration & Social Login (Entra ID via OpenID Connect) ----------
# Deploy-EntraApp.ps1 creates the app registration; env vars are injected by Container App.
# Env vars used: OPENID_ISSUER, OPENID_CLIENT_ID, OPENID_CLIENT_SECRET,
#                OPENID_SCOPE, OPENID_CALLBACK_URL, OPENID_BUTTON_LABEL
registration:
  socialLogins: ["openid"]
  allowedDomains: ["dakona.com"] # set to client's email domain per deployment

# ---------- OpenID Connect (Entra ID) ----------
# SSO is configured entirely via Container App environment variables (not this file).
# Run Deploy-EntraApp.ps1 then Deploy-SSOConfig.ps1 to configure.
# Env vars: OPENID_ISSUER, OPENID_CLIENT_ID, OPENID_CLIENT_SECRET,
#           OPENID_AUTHORIZATION_URL, OPENID_TOKEN_URL, OPENID_USERINFO_URL,
#           OPENID_SCOPE, OPENID_CALLBACK_URL, OPENID_BUTTON_LABEL

# ---------- Endpoints ----------
endpoints:
  azureOpenAI:
    # Instance-level config is injected via env vars at deploy time
    titleConvo: true
    titleModel: "gpt-4o"
    summarize: true
    summaryModel: "gpt-4o"
    plugins: false
    groups:
      - group: "dax-default"
        apiKey: "635645200b2c4f90a1833de2bda6b753"
        instanceName: "oai-dax-dakona-pilot"
        version: "2024-08-01-preview"
        models:
          gpt-4o:
            deploymentName: "gpt-4o"

  # Disable non-Azure endpoints
  openAI:
    disabled: true
  google:
    disabled: true
  anthropic:
    disabled: true
  assistants:
    disabled: true

# ---------- Model Specs (controls what users see) ----------
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "gpt-4o"
      label: "DAX Assistant"
      description: "GPT-4o via Azure OpenAI"
      default: true
      preset:
        endpoint: "azureOpenAI"
        model: "gpt-4o"
        temperature: 0.7
        maxOutputTokens: 4096
      systemPrompt: |
        You are DAX, an AI assistant purpose-built for registered investment
        advisors (RIAs). You have deep knowledge of:
        - SEC regulations including Reg BI, Rule 17a-4, Form ADV requirements
        - FINRA rules and compliance requirements
        - Fiduciary duty standards and best interest obligations
        - Client communication best practices for RIAs
        - Investment advisory compliance and recordkeeping

        Always clarify that your responses are for informational purposes and
        do not constitute legal or investment advice. Recommend consulting a
        compliance attorney or CCO for specific regulatory interpretations.

        You can analyze uploaded documents including financial statements,
        portfolio reports, Form ADVs, compliance documents, and Excel files.
        When analyzing financial documents, always note that your analysis
        is for informational purposes only.

        You are deployed inside a secure, SEC-compliant Azure environment.
        All conversations are logged and retained per Rule 17a-4.

# ---------- Interface ----------
interface:
  endpointsMenu: false  # hide endpoint picker — single model experience
  modelSelect: false
  presets: false
  showUploadButton: true
  customWelcome: "Welcome to DAX - your governed AI assistant for registered investment advisors."

# ---------- File Uploads ----------
fileConfig:
  endpoints:
    azureOpenAI:
      fileLimit: 10
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
        - "application/vnd.openxmlformats-officedocument.*"
        - "application/vnd.ms-excel"
        - "text/csv"

# ---------- Rate Limiting ----------
rateLimits:
  fileUploads:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 5
    ipWindowInMinutes: 60
    userMax: 10
    userWindowInMinutes: 60
