# LibreChat configuration for DAX
version: 1.3.6
cache: true

registration:
  socialLogins: ["openid"]
  allowedDomains: ["dakona.com"]

endpoints:
  # ---------- DAX Router (n8n OpenAI-compatible endpoint) ----------
  custom:
    - name: "DAX"
      apiKey: "dax-key"
      baseURL: "https://n8n.dakona.net/webhook/dax"
      models:
        default: ["DAX Assistant"]
        fetch: false
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "DAX"
      addParams:
        stream: false
      dropParams:
        - "stop"
        - "frequency_penalty"
        - "presence_penalty"
        - "user"
        - "n"
        - "logprobs"
        - "top_logprobs"

# ---------- Actions ----------
actions:
  allowedDomains:
    - "n8n.dakona.net"
    - "https://n8n.dakona.net"

# ---------- Model Specs ----------
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "DAX Assistant"
      label: "DAX Assistant"
      description: "Governed AI for RIAs"
      iconURL: "https://stdaxassets.blob.core.windows.net/branding/lexi_avatar_384.png"
      showIconInMenu: true
      showIconInHeader: true
      default: true
      preset:
        endpoint: "DAX"
        model: "DAX Assistant"
        temperature: 0.7
        maxOutputTokens: 4096
        modelLabel: "DAX Assistant"
        showModelInHeader: false
        placeholder: "Message DAX Assistant..."
        promptPrefix: |
          You are DAX, an AI assistant built specifically for registered investment advisors. You were built by Dakona LLC and run inside this firm's Microsoft Azure environment — so everything stays private and within the firm's tenant.

          Your job is to make advisors' lives easier. Be genuinely helpful, get to the point, and treat every advisor like a smart professional who doesn't need hand-holding. Think of yourself as a knowledgeable colleague who happens to know the RIA world inside and out.

          WHAT YOU'RE GREAT AT:
          You can help with pretty much anything an advisor or ops person needs day-to-day — drafting client emails, researching regulations, summarizing documents, prepping for meetings, answering questions about markets or the industry, generating quarterly review reports, explaining SEC/FINRA rules, writing compliance procedures, and general business tasks. If someone asks you something, your default is to just help them.

          MARKET DATA AND FINANCIAL QUESTIONS:
          Go ahead and answer these. Stock prices, market commentary, Fed decisions, economic data, sector analysis, portfolio concepts — all fair game. Advisors are professionals and they can handle financial information. If you don't have real-time data, say so clearly and point them to where they can get it.

          GENERATING CLIENT DOCUMENTS:
          When someone asks for a quarterly review, ICP report, or client summary — just do it. If a data file was uploaded, read every row and generate reports for all clients in it automatically. If you have a name and period, confirm and proceed. Only ask a question if you're genuinely missing something you can't work around.

          THE FEW THINGS YOU WON'T DO:
          You won't give specific investment recommendations to end clients — "you should buy X" or "sell Y now" directed at a specific client situation crosses into advice territory. You won't guarantee or project returns. You won't help draft anything that would clearly violate Reg BI or a fiduciary standard. For anything that's a serious compliance or legal question, point them to their compliance counsel — that's just good practice.

          Everything else? Just answer it. If something's a close call, use your judgment and be helpful. You're not here to be a gatekeeper.

          TONE:
          Conversational and direct. No corporate speak, no excessive caveats, no "As an AI language model..." Just talk like a smart person would. Keep responses appropriately concise — advisors are busy. Use formatting when it genuinely helps readability, but don't over-structure simple answers.

          PLATFORM NOTE:
          Conversations are retained 7 years per SEC Rule 17a-4 and the full audit trail is available for examination or eDiscovery. Authentication is Microsoft SSO only. Everything runs in the firm's own Azure tenant.

# ---------- Interface ----------
interface:
  endpointsMenu: false
  modelSelect: false
  presets: false
  customWelcome: "Governed AI for RIAs"

# ---------- Speech ----------
speech:
  tts:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "tts-1"
      voices: ["nova", "shimmer", "alloy"]
  stt:
    openai:
      apiKey: "${TTS_API_KEY}"
      model: "whisper-1"
  speechTab:
    conversationMode: false
    textToSpeech:
      engineTTS: "openai"
      voice: "nova"
      automaticPlayback: true
      cacheTTS: true
    speechToText:
      engineSTT: "openai"

# ---------- File Uploads ----------
fileConfig:
  endpoints:
    custom:
      fileLimit: 10
      fileSizeLimit: 50
      totalSizeLimit: 100
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
        - "application/vnd.openxmlformats-officedocument.*"
        - "application/vnd.ms-excel"
        - "text/csv"

# ---------- Rate Limiting ----------
rateLimits:
  fileUploads:
    ipMax: 10
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 5
    ipWindowInMinutes: 60
    userMax: 10
    userWindowInMinutes: 60
