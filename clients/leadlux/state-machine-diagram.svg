<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1240" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-accept" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-reject" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-suppress" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1100" height="1240" fill="#fafaf9"/>

  <text x="550" y="40" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">LeadLUX Canonical Lead State Machine</text>
  <text x="550" y="64" font-size="13" fill="#64748b" text-anchor="middle">Every transition is condition-gated and append-only. State writes use optimistic locking to prevent duplicate delivery.</text>

  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="320" height="96" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="12" y="20" font-size="11" font-weight="600" fill="#334155">Legend</text>
    <line x1="12" y1="36" x2="40" y2="36" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="48" y="40" font-size="11" fill="#475569">Normal transition</text>
    <line x1="12" y1="56" x2="40" y2="56" stroke="#059669" stroke-width="2" marker-end="url(#arrow-accept)"/>
    <text x="48" y="60" font-size="11" fill="#475569">Buyer accept / success</text>
    <line x1="12" y1="76" x2="40" y2="76" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-reject)"/>
    <text x="48" y="80" font-size="11" fill="#475569">Reject / timeout / cap</text>
    <line x1="176" y1="36" x2="204" y2="36" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow-suppress)"/>
    <text x="212" y="40" font-size="11" fill="#475569">Opt-out (from anywhere)</text>
  </g>

  <g>
    <rect x="480" y="110" width="140" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="550" y="135" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">NEW</text>
    <text x="550" y="152" font-size="10" fill="#64748b" text-anchor="middle">Record created</text>
  </g>

  <line x1="550" y1="166" x2="550" y2="204" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="189" font-size="10" fill="#64748b">required fields + dedup pass</text>

  <g>
    <rect x="460" y="204" width="180" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="550" y="229" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">INTAKE_COMPLETE</text>
    <text x="550" y="246" font-size="10" fill="#64748b" text-anchor="middle">Consent records written</text>
  </g>

  <line x1="550" y1="260" x2="550" y2="298" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="283" font-size="10" fill="#64748b">qualification dispatched</text>

  <g>
    <rect x="460" y="298" width="180" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="550" y="323" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">QUALIFYING</text>
    <text x="550" y="340" font-size="10" fill="#64748b" text-anchor="middle">AI caller / manual review</text>
  </g>

  <line x1="550" y1="354" x2="550" y2="388" stroke="#475569" stroke-width="2"/>
  <line x1="550" y1="388" x2="250" y2="388" stroke="#475569" stroke-width="2"/>
  <line x1="250" y1="388" x2="250" y2="412" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="382" font-size="10" fill="#64748b">not ready for routing</text>

  <line x1="550" y1="388" x2="550" y2="412" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="404" font-size="10" fill="#64748b">lane confirmed + lock</text>

  <g>
    <rect x="170" y="412" width="160" height="56" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="250" y="437" font-size="14" font-weight="700" fill="#713f12" text-anchor="middle">NURTURE</text>
    <text x="250" y="454" font-size="10" fill="#78350f" text-anchor="middle">parallel path</text>
  </g>

  <g>
    <rect x="460" y="412" width="180" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="550" y="437" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">QUALIFIED</text>
    <text x="550" y="454" font-size="10" fill="#64748b" text-anchor="middle">fires lead_qualified event</text>
  </g>

  <line x1="550" y1="468" x2="550" y2="506" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="484" font-size="10" fill="#64748b">exclusive_eligible</text>
  <text x="560" y="496" font-size="10" fill="#64748b">+ buyer in queue</text>

  <g>
    <rect x="450" y="506" width="200" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="550" y="531" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">EXCLUSIVE_OFFERED</text>
    <text x="550" y="548" font-size="10" fill="#64748b" text-anchor="middle">15-min timeout (configurable)</text>
  </g>

  <line x1="550" y1="562" x2="550" y2="592" stroke="#475569" stroke-width="2"/>
  <line x1="550" y1="592" x2="270" y2="592" stroke="#059669" stroke-width="2"/>
  <line x1="270" y1="592" x2="270" y2="620" stroke="#059669" stroke-width="2" marker-end="url(#arrow-accept)"/>
  <text x="320" y="586" font-size="10" fill="#059669" font-weight="600">buyer accepts</text>

  <line x1="550" y1="592" x2="840" y2="592" stroke="#dc2626" stroke-width="2"/>
  <line x1="840" y1="592" x2="840" y2="620" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-reject)"/>
  <text x="670" y="586" font-size="10" fill="#dc2626" font-weight="600">reject or timeout</text>

  <g>
    <rect x="160" y="620" width="220" height="68" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
    <text x="270" y="646" font-size="14" font-weight="700" fill="#064e3b" text-anchor="middle">EXCLUSIVE_ACCEPTED</text>
    <text x="270" y="664" font-size="10" font-weight="600" fill="#047857" text-anchor="middle">TERMINAL</text>
    <text x="270" y="679" font-size="9" fill="#047857" text-anchor="middle">fires exclusive_delivered event</text>
  </g>

  <g>
    <rect x="740" y="620" width="200" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="840" y="645" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">EXCLUSIVE_EXPIRED</text>
    <text x="840" y="662" font-size="10" fill="#64748b" text-anchor="middle">released to resale</text>
  </g>

  <line x1="840" y1="676" x2="840" y2="714" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="850" y="699" font-size="10" fill="#64748b">consent permits resale</text>

  <g>
    <rect x="740" y="714" width="200" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="840" y="739" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">RESALE_ELIGIBLE</text>
    <text x="840" y="756" font-size="10" fill="#64748b" text-anchor="middle">next endpoint in queue</text>
  </g>

  <line x1="840" y1="770" x2="840" y2="808" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="850" y="793" font-size="10" fill="#64748b">endpoint locked</text>

  <g>
    <rect x="720" y="808" width="240" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="840" y="833" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">RESALE_IN_PROGRESS</text>
    <text x="840" y="850" font-size="10" fill="#64748b" text-anchor="middle">awaiting buyer response</text>
  </g>

  <line x1="840" y1="864" x2="840" y2="902" stroke="#059669" stroke-width="2" marker-end="url(#arrow-accept)"/>
  <text x="850" y="887" font-size="10" fill="#059669" font-weight="600">delivery accepted</text>

  <g>
    <rect x="740" y="902" width="200" height="56" rx="8" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="840" y="927" font-size="14" font-weight="700" fill="#0c4a6e" text-anchor="middle">RESALE_DELIVERED</text>
    <text x="840" y="944" font-size="10" fill="#64748b" text-anchor="middle">resale_event_count++</text>
  </g>

  <path d="M 740 930 Q 640 930 640 742 L 740 742" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="824" font-size="10" fill="#64748b" font-weight="600">count &lt; cap</text>
  <text x="500" y="837" font-size="10" fill="#64748b">and endpoints remain</text>

  <line x1="840" y1="958" x2="840" y2="996" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-reject)"/>
  <text x="850" y="974" font-size="10" fill="#dc2626" font-weight="600">cap reached</text>
  <text x="850" y="986" font-size="10" fill="#dc2626" font-weight="600">or queue empty</text>

  <g>
    <rect x="740" y="996" width="200" height="68" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <text x="840" y="1022" font-size="14" font-weight="700" fill="#7f1d1d" text-anchor="middle">RESALE_EXHAUSTED</text>
    <text x="840" y="1040" font-size="10" font-weight="600" fill="#991b1b" text-anchor="middle">TERMINAL</text>
    <text x="840" y="1055" font-size="9" fill="#991b1b" text-anchor="middle">no further delivery</text>
  </g>

  <g>
    <rect x="80" y="996" width="200" height="68" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="180" y="1022" font-size="14" font-weight="700" fill="#4c1d95" text-anchor="middle">SUPPRESSED</text>
    <text x="180" y="1040" font-size="10" font-weight="600" fill="#5b21b6" text-anchor="middle">TERMINAL</text>
    <text x="180" y="1055" font-size="9" fill="#5b21b6" text-anchor="middle">opt-out from any state</text>
  </g>

  <line x1="180" y1="996" x2="180" y2="210" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,4" opacity="0.4"/>
  <text x="100" y="580" font-size="10" fill="#7c3aed" transform="rotate(-90, 100, 580)" font-weight="600">opt-out received on any channel</text>

  <g transform="translate(0, 1120)">
    <rect x="40" y="0" width="1020" height="90" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="24" font-size="11" font-weight="600" fill="#334155">Race condition prevention</text>
    <text x="60" y="44" font-size="10" fill="#475569">Every state transition writes state_version + 1. If the record has already moved past the expected version, the transition fails and</text>
    <text x="60" y="58" font-size="10" fill="#475569">logs — it does not retry silently or duplicate. This is enforced at the state machine level, not in application logic, which means</text>
    <text x="60" y="72" font-size="10" fill="#475569">no concurrent delivery can exceed resale_cap under load.</text>
  </g>
</svg>
