  .msg-doc.outgoing { border-top: 3px solid #3fb950; }

  /* APEX styles */

  .apex-score-mid { background: #f59e0b18; border: 1px solid #f59e0b40; color: #f59e0b; }

  .apex-notes { margin-top: 12px; padding: 10px 12px; background: #451a0310; border: 1px solid #92400e30; border-radius: 6px; font-size: 12px; color: #fbbf24; line-height: 1.5; }
  .apex-proposal-card { background: #111114; border: 1px solid #1e1e24; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }

  .apex-proposal-label { font-size: 11px; color: #4b5563; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
  .apex-copy-btn { padding: 6px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .apex-copy-btn-ready { background: #f59e0b; color: #0d0d0f; }
  .apex-copy-btn-done { background: #16a34a; color: #fff; }
  .apex-proposal-body { padding: 16px; max-height: 380px; overflow-y: auto; }
  .apex-proposal-text { white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.7; color: #d1d5db; margin: 0; }
  .apex-video-card { background: #111114; border: 1px solid #1e1e24; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .apex-video-toggle { width: 100%; padding: 12px 16px; background: transparent; border: none; display: flex; align-items: center; justify-content: space-between; cursor: pointer; color: #6b7280; font-size: 11px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; text-transform: uppercase; }
  .apex-video-body { padding: 4px 16px 16px; }
  .apex-actions-primary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .apex-actions-secondary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .apex-btn-upwork { display: block; padding: 12px; background: #0c4a2310; border: 1px solid #16643440; border-radius: 8px; color: #4ade80; text-align: center; font-weight: 600; font-size: 14px; text-decoration: none; }
  .apex-btn-next { padding: 12px; background: #ffffff06; border: 1px solid #1e1e24; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; font-family: inherit; }
  .apex-btn-next-active { color: #9ca3af; }
  .apex-btn-next-disabled { color: #374151; cursor: not-allowed; }
  .apex-btn-skip { padding: 11px; background: #7f1d1d08; border: 1px solid #7f1d1d40; border-radius: 8px; color: #f87171; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; }
  .apex-btn-applied { padding: 11px; background: #14532d08; border: 1px solid #14532d40; border-radius: 8px; color: #86efac; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; }
  .apex-dots { display: flex; justify-content: center; gap: 6px; }

  .apex-load-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .apex-load-desc { color: #6b7280; font-size: 14px; margin-bottom: 32px; max-width: 340px; margin-left: auto; margin-right: auto; }
  .apex-load-btn { padding: 12px 32px; background: #f59e0b; color: #0d0d0f; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }
  .apex-spinner { width: 40px; height: 40px; margin: 0 auto 20px; border: 2px solid #27272a; border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
  .apex-empty { text-align: center; padding-top: 60px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SHEET_ID = "11cydvXB7zb38FGSqrLTXEnikIK5gec1FSe3nK3Hy_BY";
const GDRIVE_MCP = "https://drivemcp.googleapis.com/mcp/v1";

const LOAD_PROMPT = `Use the Google Drive tool to read the Google Sheets file with ID: ${SHEET_ID}

Look for the sheet tab named "UpWork_Log".

Return ONLY a raw JSON array (no markdown fences, no explanation, no preamble) of rows where ALL of these are true:
- The "Cover Letter" column is not empty and not blank
- The "Status" column does NOT contain "Submitted", "Skip", "SKIP", "Done", "Ignore"

Each element must have exactly these fields (use null if missing):
{
  "row_number": <number>,
  "job_title": <string>,
  "upwork_link": <string>,
  "cover_letter": <string>,
  "video_script": <string|null>,
  "video_url": <string|null>,
  "proposed_rate": <string>,
  "combined_score": <string|number>,
  "highlights": <string|null>,
  "bid_recommendation": <string|null>,
  "notes": <string|null>,
  "close_type": <string|null>,
  "status": <string|null>
}

Return the raw JSON array only. Start your response with [ and end with ].`;

async function fetchJobs() {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": "%%ANTHROPIC_API_KEY%%", "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 8000,
      mcp_servers: [{ type: "url", url: GDRIVE_MCP, name: "google-drive" }],
      messages: [{ role: "user", content: LOAD_PROMPT }],
    }),
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  const clean = text.replace(/```json\n?/gi, "").replace(/```\n?/g, "").trim();
  const start = clean.indexOf("["); const end = clean.lastIndexOf("]");
  if (start === -1 || end === -1) throw new Error("No JSON array in response");
  return JSON.parse(clean.slice(start, end + 1));
}

function ScoreBadge({ score }) {
  const n = parseFloat(score) || 0;
  const cls = n >= 14 ? "apex-score-badge" : "apex-score-badge apex-score-mid";
  return <span className={cls}>{score}/20</span>;
}

function ApexQueue() {
  const [jobs, setJobs] = useState([]);
  const [skipped, setSkipped] = useState(new Set());
  const [applied, setApplied] = useState(new Set());
  const [idx, setIdx] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [copied, setCopied] = useState(false);
  const [showVideo, setShowVideo] = useState(false);

  const activeJobs = jobs.filter(j => !skipped.has(j.row_number) && !applied.has(j.row_number));
  const job = activeJobs[idx] || null;

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const data = await fetchJobs();
      setJobs(data); setIdx(0); setSkipped(new Set()); setApplied(new Set()); setShowVideo(false);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  const copy = () => {
    if (!job) return;
    navigator.clipboard.writeText(job.cover_letter).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    });
  };

  const advance = (dir = 1) => {
    setShowVideo(false); setCopied(false);
    const n = idx + dir;
    if (n >= 0 && n < activeJobs.length) setIdx(n);
    else if (n >= activeJobs.length) setIdx(0);
  };

  const markSkip = () => {
    if (!job) return;
    setSkipped(s => new Set([...s, job.row_number]));
    setShowVideo(false); setCopied(false);
    if (idx >= activeJobs.length - 1) setIdx(Math.max(0, idx - 1));
  };

  const markApplied = () => {
    if (!job) return;
    setApplied(a => new Set([...a, job.row_number]));
    setShowVideo(false); setCopied(false);
    if (idx >= activeJobs.length - 1) setIdx(Math.max(0, idx - 1));
  };

  const remaining = activeJobs.length;

  if (!jobs.length && !loading) return (
    <div className="apex-load-screen">
      <div className="apex-load-icon">Ã°Å¸â€œâ€¹</div>
      <div className="apex-load-title">APEX Submission Queue</div>
      <div className="apex-load-desc">Loads all jobs with proposals ready to submit from UpWork_Log.</div>
      <button className="apex-load-btn" onClick={load}>Load Queue</button>
      {error && <p style={{color:'#f87171',fontSize:'13px',marginTop:'16px'}}>{error}</p>}
    </div>
  );

  if (loading) return (
    <div className="apex-load-screen">
      <div className="apex-spinner"></div>
      <p style={{color:'#9ca3af',fontSize:'14px'}}>Reading your sheet...</p>
      <p style={{color:'#4b5563',fontSize:'12px',marginTop:'6px'}}>Usually 10Ã¢â‚¬â€œ20 seconds</p>
    </div>
  );

  if (!loading && jobs.length > 0 && remaining === 0) return (
    <div className="apex-empty">
      <div style={{fontSize:'40px',marginBottom:'16px'}}>Ã¢Å“â€¦</div>
      <div style={{fontSize:'20px',fontWeight:600,marginBottom:'8px'}}>Queue Complete</div>
      <div style={{color:'#6b7280',fontSize:'14px',marginBottom:'24px'}}>{applied.size} applied Ã‚Â· {skipped.size} skipped</div>
      <button className="apex-load-btn" style={{background:'transparent',color:'#9ca3af',border:'1px solid #27272a'}} onClick={load}>Reload Queue</button>
    </div>
  );

  if (!job) return null;

  const highlights = job.highlights ? job.highlights.split('|').map(h => h.trim()).filter(Boolean) : [];

  return (
    <div>
      <div className="apex-topbar">
        <div style={{fontFamily:'JetBrains Mono, monospace',fontSize:'13px',color:'#6b7280',letterSpacing:'1px'}}>APEX QUEUE</div>
        <div className="apex-stats">
          <span className="apex-stat-applied">{applied.size} applied</span>
          <span className="apex-stat-skipped">{skipped.size} skipped</span>
          <span className="apex-stat-remaining">{remaining} remaining</span>
        </div>
      </div>

      <div className="apex-progress-row">
        <div className="apex-progress">
          <div className="apex-progress-fill" style={{width:`${((idx+1)/remaining)*100}%`}}></div>
        </div>
        <span className="apex-counter">{idx+1} / {remaining}</span>
      </div>

      <div className="apex-job-card">
        <div className="apex-job-title">{job.job_title}</div>
        <div className="apex-badges">
          <ScoreBadge score={job.combined_score} />
          {job.proposed_rate && <span className="apex-rate-badge">{job.proposed_rate}</span>}
          {job.close_type && <span className="apex-close-badge">{job.close_type}</span>}
        </div>
        {job.notes && <div className="apex-notes">Ã¢Å¡Â Ã¯Â¸Â {job.notes}</div>}
      </div>

      {job.bid_recommendation && (
        <div className="apex-bid">
          <span className="apex-bid-label">Bid</span>

      }

          <div className="desk-block">

            <div className="char-legs"><div className="char-leg" style={{background:a.color,opacity:0.5}}></div><div className="char-leg" style={{background:a.color,opacity:0.5}}></div></div>
          </div>
          <div className="desk-name" style={{color:isActive?a.color:'#6e7681'}}>{a.name}</div>
          <div className="desk-role">{a.role}</div>
        </div>);
      })}</div>))}
      {messengers.filter(m => now - m.ts < 2500).map(m => {
        const from = m.fromPos; const to = m.toPos; if (!from || !to) return null;
        const t = Math.min((now - m.ts) / 1800, 1);
        const x = from.x + (to.x - from.x) * t - 9; const y = from.y + (to.y - from.y) * t - 30;
        const typeLabel = m.msgType === 'instruction' ? '\u2193 Task' : m.msgType === 'output' ? '\u2191 Output' : '\u2194 Handoff';

          {m.label!=='...' && <div className="msg-label">{m.label}</div>}
        </div>);
      })}
    </div>
    <div className="office-bar">
      {agentDefs.filter(a=>a.id!=='richard').map(a => {
        const isActive = agentState[a.id] ? (now-agentState[a.id].ts<THR) : true;

    {tab==='portal' && <Portal />}
    {tab==='feed' && <ActivityFeed />}
    {tab==='infra' && <Infrastructure liveStatus={liveStatus} />}
    {tab==='neural' && <NeuralCenter />}
    {tab==='costs' && <CostDashboard events={events} />}
    {tab==='apex' && <ApexQueue />}
    {lastUpdate && <div className="last-poll">Last poll: {lastUpdate.toLocaleTimeString()} (every 30s)</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
