<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAX Mission Control</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Inter', system-ui, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #30363d; }
  .header h1 { font-size: 22px; font-weight: 700; } .header h1 span { color: #58a6ff; }
  .header .meta { font-size: 11px; color: #6e7681; }
  .status-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; padding: 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
  .spill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; background: #0d1117; border: 1px solid #30363d; cursor: pointer; }
  .spill:hover { border-color: #58a6ff; }
  .sdot { width: 6px; height: 6px; border-radius: 50%; }
  .sg { background: #3fb950; box-shadow: 0 0 4px rgba(63,185,80,0.5); }
  .sr { background: #f85149; } .sy { background: #d29922; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab { padding: 7px 16px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: #8b949e; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; }
  .tab:hover { color: #e6edf3; background: #161b22; }
  .tab.active { color: #e6edf3; background: #161b22; border-color: #30363d; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .section { margin-bottom: 22px; }
  .section-hdr { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #30363d; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 14px 16px; border-left: 3px solid #30363d; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color 0.15s; text-decoration: none; color: inherit; }
  .card:hover { border-color: #58a6ff; }
  .card.blue { border-left-color: #58a6ff; } .card.purple { border-left-color: #bc8cff; }
  .card.orange { border-left-color: #f0883e; } .card.yellow { border-left-color: #d29922; }
  .card.cyan { border-left-color: #39d2c0; } .card.green { border-left-color: #3fb950; }
  .ci { font-size: 26px; } .cn { font-size: 14px; font-weight: 600; } .cd { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .ca { font-size: 12px; color: #6e7681; margin-left: auto; white-space: nowrap; }
  .copy-btn { font-size: 11px; color: #6e7681; cursor: pointer; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-left: auto; }
  .copy-btn:hover { background: #21262d; color: #3fb950; }
  .admin-row { display: flex; gap: 16px; flex-wrap: wrap; padding: 6px 0; }
  .admin-link { font-size: 11px; color: #58a6ff; text-decoration: none; }
  .admin-link:hover { text-decoration: underline; }
  .feed { display: flex; flex-direction: column; gap: 2px; }
  .fi { display: flex; gap: 12px; padding: 10px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; }
  .ft { font-size: 11px; color: #6e7681; min-width: 130px; font-family: 'JetBrains Mono', monospace; }
  .fx { font-size: 12px; } .fa { font-weight: 600; }
  .fdot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .ic { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; display: flex; align-items: center; gap: 14px; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 600; }
  .blv { color: #3fb950; background: rgba(63,185,80,0.1); }
  .boff { color: #f85149; background: rgba(248,81,73,0.1); }
  .office { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; position: relative; overflow: hidden; }
  .office-floor { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; min-height: 720px; position: relative; }
  .office-row { display: flex; gap: 30px; justify-content: center; }
  .desk-unit { text-align: center; position: relative; width: 90px; }
  .desk-block { background: #21262d; border: 2px solid #30363d; border-radius: 4px; padding: 8px 6px 6px; position: relative; }
  .monitor { width: 28px; height: 20px; background: #0d1117; border: 2px solid; border-radius: 2px; margin: 0 auto 2px; }
  .monitor.on::after { content: ''; display: block; width: 8px; height: 2px; background: currentColor; margin: 6px auto; opacity: 0.6; animation: blink 1.5s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .mon-stand { width: 6px; height: 3px; background: #30363d; margin: 0 auto; }
  .char-head { width: 22px; height: 22px; border-radius: 4px; margin: 4px auto 2px; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; }
  .char-body { width: 18px; height: 14px; border-radius: 2px; margin: 0 auto; }
  .char-legs { display: flex; gap: 4px; justify-content: center; }
  .char-leg { width: 6px; height: 6px; border-radius: 1px; }
  .desk-name { font-size: 9px; font-weight: 600; margin-top: 4px; letter-spacing: 0.3px; }
  .desk-role { font-size: 8px; color: #6e7681; }
  .desk-unit.active .char-head { animation: bob 1.5s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .desk-flash { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; animation: flashPop 1s ease-out forwards; }
  @keyframes flashPop { 0% { transform: scale(0.5); opacity: 0; } 20% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
  .messenger { position: absolute; z-index: 10; pointer-events: none; }
  .msg-doc { width: 18px; height: 22px; background: #e6edf3; border-radius: 2px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .msg-doc::before { content: ''; position: absolute; top: 4px; left: 3px; right: 3px; height: 2px; background: #6e7681; border-radius: 1px; box-shadow: 0 4px 0 #8b949e, 0 8px 0 #6e7681; }
  .msg-doc.outgoing { border-top: 3px solid #3fb950; }
  .msg-doc.incoming { border-top: 3px solid #58a6ff; }
  .msg-doc.instruction { border-top: 3px solid #d29922; }
  .msg-label { position: absolute; top: 24px; left: 50%; transform: translateX(-50%); font-size: 7px; white-space: nowrap; color: #e6edf3; background: #21262d; padding: 1px 4px; border-radius: 3px; border: 1px solid #30363d; }
  .msg-type { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 8px; font-weight: 600; white-space: nowrap; }
  .office-bar { background: #161b22; border-top: 1px solid #30363d; padding: 8px 16px; display: flex; gap: 14px; align-items: center; font-size: 10px; flex-wrap: wrap; }
  .ob-item { display: flex; align-items: center; gap: 4px; }
  .ob-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .last-poll { text-align: right; font-size: 10px; color: #6e7681; margin-top: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const agentDefs = [
  { id:'richard', name:'RICHARD', init:'RM', role:'Director', color:'#d4a843', row:0 },
  { id:'projectai', name:'PROJECTAI', init:'PA', role:'Chief of Staff', color:'#6366f1', row:1 },
  { id:'sonnet', name:'SONNET', init:'S', role:'Architect', color:'#58a6ff', row:2 },
  { id:'cc', name:'CLAUDE CODE', init:'CC', role:'Builder', color:'#8b5cf6', row:2 },
  { id:'mcp', name:'MCP SERVER', init:'MCP', role:'Gateway', color:'#f97316', row:3 },
  { id:'bridge', name:'BRIDGE', init:'BR', role:'Relay', color:'#f59e0b', row:4 },
  { id:'vm', name:'VM-DAX-DEV', init:'VM', role:'DevOps', color:'#06b6d4', row:4 },
  { id:'n8n', name:'N8N', init:'N8', role:'Automation', color:'#eab308', row:5 },
  { id:'dax', name:'DAX', init:'DX', role:'Platform', color:'#22c55e', row:5 },
];
const nameToId = {'Sonnet':'sonnet','Claude Code':'cc','ProjectAI':'projectai','MCP Server':'mcp','MCP':'mcp','Bridge':'bridge','n8n':'n8n','vm-dax-dev':'vm','DAX':'dax','Richard':'richard'};
const idToColor = {}; agentDefs.forEach(a => idToColor[a.id] = a.color);
const statusKeys = ['mcp','bridge','n8n','vm','dax'];
const statusLabels = {mcp:'MCP Server',bridge:'Bridge',n8n:'n8n',vm:'OpenClaw',dax:'DAX'};
const statusApiMap = {mcp:'mcpServer',bridge:'bridge',n8n:'n8n',vm:'vmDaxDev',dax:'dax'};

const portalGroups = [
  { label:'DAX PLATFORM', color:'#3fb950', items:[
    { name:'DAX Chatbot', url:'https://ca-dax-dakona-pilot.icyplant-88ae76cd.eastus.azurecontainerapps.io', icon:'\uD83E\uDD16', desc:'RIA client chatbot (LibreChat)', ccolor:'green' },
    { name:'OpenClaw / ProjectAI', url:'https://openclaw.dakona.net', icon:'\uD83E\uDD9E', desc:'AI agent dashboard', ccolor:'green' },
    { name:'Telegram Bot', url:'https://t.me/Dax_dakona_bot', icon:'\uD83D\uDCF1', desc:'@Dax_dakona_bot', ccolor:'green' },
  ]},
  { label:'AUTOMATION & WORKFLOWS', color:'#d29922', items:[
    { name:'n8n Workflows', url:'https://n8n.dakona.net', icon:'\u26A1', desc:'11 RPE workflows, DAX integrations', ccolor:'yellow' },
  ]},
  { label:'SSH ACCESS (BROWSER TERMINAL)', color:'#f0883e', items:[
    { name:'n8n Server', url:'https://ssh-n8n.dakona.net', icon:'\uD83D\uDD10', desc:'Browser SSH to dkn8n@n8n', ccolor:'orange' },
    { name:'vm-dax-dev (2-hop)', url:'https://ssh-n8n.dakona.net', icon:'\uD83D\uDDA5\uFE0F', desc:'Login to n8n, then: ssh daxadmin@172.16.0.5', cmd:'ssh daxadmin@172.16.0.5', ccolor:'orange' },
    { name:'Desktop', url:'https://ram-bot.dakona.net', icon:'\uD83C\uDFE0', desc:'Browser SSH to RICHARD-WS', ccolor:'orange' },
  ]},
  { label:'ADMIN & MANAGEMENT', color:'#58a6ff', items:[
    { name:'Azure Portal', url:'https://portal.azure.com', icon:'\u2601\uFE0F', desc:'VMs, Container Apps, Key Vault', ccolor:'blue' },
    { name:'Cloudflare', url:'https://dash.cloudflare.com', icon:'\uD83D\uDEE1\uFE0F', desc:'Tunnels, DNS, Access policies', ccolor:'blue' },
    { name:'ClickUp', url:'https://app.clickup.com', icon:'\u2705', desc:'Project task management', ccolor:'blue' },
    { name:'Anthropic Console', url:'https://console.anthropic.com', icon:'\uD83E\uDDE0', desc:'API usage & rate limits', ccolor:'blue' },
    { name:'Slack (1AltX)', url:'https://1altx.slack.com', icon:'\uD83D\uDCAC', desc:'#dax-collab, #alerts, #n8n-errors', ccolor:'blue' },
  ]},
];

function Portal() {
  const [copied, setCopied] = useState(null);
  const copy = (t,k) => { navigator.clipboard.writeText(t); setCopied(k); setTimeout(() => setCopied(null), 2000); };
  return (<div>
    {portalGroups.map(g => (<div key={g.label} className="section">
      <div className="section-hdr" style={{color:g.color}}>{g.label}</div>
      <div className="grid">{g.items.map(p => (
        <div key={p.name} className={`card ${p.ccolor}`}>
          <a href={p.url} target="_blank" rel="noopener" style={{display:'flex',alignItems:'center',gap:'14px',flex:1,textDecoration:'none',color:'inherit'}}>
            <span className="ci">{p.icon}</span>
            <div><div className="cn">{p.name}</div><div className="cd">{p.desc}</div>
              {p.cmd && <div className="mono" style={{fontSize:'10px',color:'#58a6ff',marginTop:'3px'}}>{p.cmd}</div>}
            </div>
          </a>
          {p.cmd ? <span className="copy-btn" onClick={e=>{e.stopPropagation();copy(p.cmd,p.name);}}>{copied===p.name?'\u2705 Copied':'Copy cmd'}</span> : <span className="ca">Open \u2197</span>}
        </div>))}</div>
    </div>))}
    <div className="admin-row">
      <a href="https://api.slack.com/apps" target="_blank" className="admin-link">Slack App Config</a>
      <a href="https://one.dash.cloudflare.com" target="_blank" className="admin-link">Zero Trust</a>
      <a href="https://console.cloud.google.com" target="_blank" className="admin-link">Google Cloud</a>
    </div>
  </div>);
}

function ActivityFeed() {
  const [events, setEvents] = useState([]);
  const [connected, setConnected] = useState(false);
  useEffect(() => {
    const sse = new EventSource('/api/events');
    sse.onopen = () => setConnected(true);
    sse.onmessage = e => { setEvents(prev => [JSON.parse(e.data), ...prev].slice(0, 100)); };
    sse.onerror = () => setConnected(false);
    return () => sse.close();
  }, []);
  return (<div>
    <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',fontSize:'11px',color:'#6e7681'}}>
      <span className="ob-dot" style={{background:connected?'#3fb950':'#f85149'}}></span>
      {connected?'Live stream connected':'Connecting...'}<span style={{marginLeft:'auto'}}>{events.length} events</span>
    </div>
    <div className="feed">{events.map(evt => (
      <div key={evt.id} className="fi"><span className="ft">{new Date(evt.ts).toLocaleString()}</span>
        <span className="fx"><span className="fdot" style={{background:idToColor[nameToId[evt.agent]]||'#58a6ff'}}></span>
          <span className="fa" style={{color:idToColor[nameToId[evt.agent]]||'#58a6ff'}}>{evt.agent}</span> {evt.action}
          {evt.detail && <span style={{color:'#6e7681'}}> — {evt.detail}</span>}
        </span></div>))}
      {events.length===0 && <div style={{padding:'20px',textAlign:'center',color:'#6e7681'}}>Waiting for events...</div>}
    </div>
  </div>);
}

const infraItems = [
  {name:'MCP Server',url:'mcp.dakona.net',detail:'Azure East US',icon:'\u2699\uFE0F',key:'mcpServer'},
  {name:'Bridge',url:'bridge.dakona.net',detail:'RICHARD-WS / Express :3001',icon:'\uD83C\uDF09',key:'bridge'},
  {name:'n8n',url:'n8n.dakona.net',detail:'11 RPE workflows',icon:'\u26A1',key:'n8n'},
  {name:'vm-dax-dev',url:'172.16.0.5',detail:'B1ms Ubuntu / OpenClaw',icon:'\uD83D\uDDA5\uFE0F',key:'vmDaxDev'},
  {name:'OpenClaw',url:'openclaw.dakona.net',detail:'Gateway :18789',icon:'\uD83E\uDD9E',key:'vmDaxDev'},
  {name:'DAX',url:'ca-dax-dakona-pilot',detail:'Azure Container / Healthy',icon:'\uD83E\uDD16',key:'dax'},
  {name:'SSH Tunnel',url:'ram-bot.dakona.net',detail:'OpenSSH / Cloudflare Access',icon:'\uD83D\uDD10',key:null},
];
function Infrastructure({liveStatus}) {
  const st = k => { if(!k||!liveStatus) return 'live'; return liveStatus.agents?.[k]?.status==='active'?'live':'offline'; };
  return (<div className="grid">{infraItems.map(s => (
    <div key={s.name} className="ic"><span style={{fontSize:'24px'}}>{s.icon}</span>
      <div style={{flex:1}}><div style={{fontSize:'14px',fontWeight:600}}>{s.name}</div>
        <div className="mono" style={{fontSize:'11px',color:'#58a6ff'}}>{s.url}</div>
        <div style={{fontSize:'11px',color:'#6e7681',marginTop:'2px'}}>{s.detail}</div>
      </div><span className={`badge ${st(s.key)==='live'?'blv':'boff'}`}>{st(s.key).toUpperCase()}</span>
    </div>))}</div>);
}

/* ── Agent Office with Messenger Runners ──────────────────────────── */
function NeuralCenter() {
  const [agentState, setAgentState] = useState({});
  const [messengers, setMessengers] = useState([]);
  const [flashes, setFlashes] = useState({});
  const msgId = useRef(0);
  const containerRef = useRef(null);
  const deskRefs = useRef({});
  const [, forceUpdate] = useState(0);

  const rows = [[],[],[],[],[],[]];
  agentDefs.forEach(a => rows[a.row].push(a));

  // Get actual desk position from DOM
  const getDeskPos = (agentId) => {
    const el = deskRefs.current[agentId];
    const container = containerRef.current;
    if (!el || !container) return { x: 400, y: 200 };
    const cRect = container.getBoundingClientRect();
    const eRect = el.getBoundingClientRect();
    return { x: eRect.left - cRect.left + eRect.width / 2, y: eRect.top - cRect.top + eRect.height / 2 };
  };

  const spawnMessenger = useCallback((fromId, toId, label) => {
    const from = getDeskPos(fromId); const to = getDeskPos(toId);
    if (!from || !to) return;
    const id = msgId.current++;
    const fromAgent = agentDefs.find(a => a.id === fromId);
    const toAgent = agentDefs.find(a => a.id === toId);
    // Classify: instruction flows down (lower row#), output flows up
    const fromRow = fromAgent?.row || 0;
    const toRow = toAgent?.row || 0;
    let msgType = 'output';
    if (fromRow < toRow) msgType = 'instruction';
    else if (fromRow > toRow) msgType = 'output';
    else msgType = 'handoff';
    setFlashes(prev => ({...prev, [fromId]: 'send'}));
    setMessengers(prev => [...prev.slice(-10), {id, fromId, toId, fromPos:{...from}, toPos:{...to}, label:(label||'').slice(0,18), color: fromAgent?.color||'#58a6ff', msgType, ts: Date.now()}]);
    setTimeout(() => {
      setFlashes(prev => ({...prev, [fromId]: null, [toId]: 'recv'}));
      setTimeout(() => setFlashes(prev => ({...prev, [toId]: null})), 1200);
    }, 1800);
  }, []);

  useEffect(() => {
    const sse = new EventSource('/api/events');
    let lastTs = Date.now();
    sse.onmessage = e => {
      const evt = JSON.parse(e.data);
      lastTs = Date.now();
      const fromId = nameToId[evt.agent] || evt.from;
      if (fromId) {
        setAgentState(prev => ({...prev, [fromId]: {action: evt.action, ts: evt.ts}}));
        const toId = evt.to ? (nameToId[evt.to]||evt.to) : null;
        if (toId) { spawnMessenger(fromId, toId, evt.action); }
        else {
          const others = agentDefs.filter(a => a.id !== fromId && a.id !== 'richard');
          const t = others[Math.floor(Math.random()*others.length)];
          spawnMessenger(fromId, t.id, evt.action);
        }
      }
    };
    // Fallback routes follow the hierarchy
    const hiRoutes = [
      ['richard','projectai'], ['projectai','sonnet'], ['projectai','cc'],
      ['sonnet','cc'], ['cc','mcp'], ['sonnet','mcp'],
      ['mcp','bridge'], ['mcp','vm'], ['vm','n8n'], ['vm','dax'],
      ['cc','projectai'], ['sonnet','projectai'], ['projectai','richard'],
    ];
    const fallback = setInterval(() => {
      if (Date.now() - lastTs > 10000) {
        const route = hiRoutes[Math.floor(Math.random()*hiRoutes.length)];
        spawnMessenger(route[0], route[1], '...');
      }
    }, 10000);
    const ticker = setInterval(() => forceUpdate(n=>n+1), 100);
    return () => { sse.close(); clearInterval(fallback); clearInterval(ticker); };
  }, [spawnMessenger]);

  const now = Date.now();
  const THR = 30*60*1000;

  return (<div className="office">
    <div className="office-floor" ref={containerRef}>
      {rows.map((row, ri) => (
        <div key={ri} className="office-row">
          {row.map(a => {
            const isActive = a.id==='richard' || (agentState[a.id] ? (now-agentState[a.id].ts<THR) : true);
            const flash = flashes[a.id];
            return (<div key={a.id} ref={el => deskRefs.current[a.id] = el} className={`desk-unit ${isActive?'active':''}`} style={{animationDelay:`${Math.random()}s`}}>
              <div className="desk-block">
                {flash && <div className="desk-flash" style={{background:flash==='send'?'#3fb950':'#58a6ff'}}>{flash==='send'?'\u2934':'\u2935'}</div>}
                <div className="monitor on" style={{borderColor:a.color,color:a.color}}></div>
                <div className="mon-stand"></div>
                <div className="char-head" style={{background:a.color}}>{a.init}</div>
                <div className="char-body" style={{background:a.color,opacity:0.7}}></div>
                <div className="char-legs">
                  <div className="char-leg" style={{background:a.color,opacity:0.5}}></div>
                  <div className="char-leg" style={{background:a.color,opacity:0.5}}></div>
                </div>
              </div>
              <div className="desk-name" style={{color:isActive?a.color:'#6e7681'}}>{a.name}</div>
              <div className="desk-role">{a.role}</div>
            </div>);
          })}
        </div>
      ))}
      {messengers.filter(m => now - m.ts < 2500).map(m => {
        const from = m.fromPos; const to = m.toPos;
        if (!from || !to) return null;
        const t = Math.min((now - m.ts) / 1800, 1);
        const x = from.x + (to.x - from.x) * t - 9;
        const y = from.y + (to.y - from.y) * t - 30;
        const typeLabel = m.msgType === 'instruction' ? '\u2193 Task' : m.msgType === 'output' ? '\u2191 Output' : '\u2194 Handoff';
        const typeColor = m.msgType === 'instruction' ? '#d29922' : m.msgType === 'output' ? '#3fb950' : '#58a6ff';
        return (<div key={m.id} className="messenger" style={{left:x,top:y}}>
          <div className="msg-type" style={{color:typeColor}}>{typeLabel}</div>
          <div className={`msg-doc ${m.msgType === 'instruction' ? 'instruction' : m.msgType === 'output' ? 'outgoing' : 'incoming'}`}></div>
          {m.label!=='...' && <div className="msg-label">{m.label}</div>}
        </div>);
      })}
    </div>
    <div className="office-bar">
      {agentDefs.filter(a=>a.id!=='richard').map(a => {
        const isActive = agentState[a.id] ? (now-agentState[a.id].ts<THR) : true;
        return (<span key={a.id} className="ob-item">
          <span className="ob-dot" style={{background:isActive?a.color:'#6e7681'}}></span>
          <span style={{color:isActive?a.color:'#6e7681'}}>{a.name}</span>
        </span>);
      })}
    </div>
  </div>);
}

function App() {
  const [tab, setTab] = useState('portal');
  const [liveStatus, setLiveStatus] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);
  useEffect(() => {
    const poll = () => { fetch('/api/status').then(r=>r.json()).then(d=>{setLiveStatus(d);setLastUpdate(new Date());}).catch(()=>{}); };
    poll(); const id = setInterval(poll, 30000); return () => clearInterval(id);
  }, []);
  const svcOk = k => { const s = liveStatus?.agents?.[statusApiMap[k]]?.status; return s === 'active' || s === 'live'; };
  return (<div className="app">
    <div className="header"><h1><span>DAX</span> Mission Control</h1><div className="meta">control.1altx.ai</div></div>
    <div className="status-bar">
      {statusKeys.map(k => (<div key={k} className="spill" onClick={()=>setTab('infra')}>
        <span className={`sdot ${svcOk(k)?'sg':liveStatus?'sr':'sy'}`}></span><span>{statusLabels[k]}</span>
      </div>))}
    </div>
    <div className="tabs">
      {[{id:'portal',label:'Portal'},{id:'feed',label:'Activity Feed'},{id:'infra',label:'Infrastructure'},{id:'neural',label:'Agent Office'}].map(t => (
        <button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>
      ))}
    </div>
    {tab==='portal' && <Portal />}
    {tab==='feed' && <ActivityFeed />}
    {tab==='infra' && <Infrastructure liveStatus={liveStatus} />}
    {tab==='neural' && <NeuralCenter />}
    {lastUpdate && <div className="last-poll">Last poll: {lastUpdate.toLocaleTimeString()} (every 30s)</div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
